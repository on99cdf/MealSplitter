<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MealSplitter - 食飯計數助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; border-top-color: transparent; }
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // 🛠️ 在這裡貼上你的 FIREBASE CONFIG 🛠️
        // ==========================================
        const myConfig = {
            apiKey: "AIzaSyCmBoGyTglKOzuSvTbv4si5Fr332vdQ_yY",
    authDomain: "on99cdf.firebaseapp.com",
    projectId: "on99cdf",
    storageBucket: "on99cdf.firebasestorage.app",
    messagingSenderId: "157518125465",
    appId: "1:157518125465:web:9aecfda14a2afbb9fe1b08",
    measurementId: "G-WHJNPTK1QM"
        };
        // ==========================================

        const Icon = {
            Camera: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>,
            Users: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>,
            Receipt: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z"></path></svg>,
            History: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [members, setMembers] = useState([]);
            const [receipts, setReceipts] = useState([]);
            const [loading, setLoading] = useState(false);
            const [currentReceipt, setCurrentReceipt] = useState(null);
            const [payerId, setPayerId] = useState('');
            const [splitMode, setSplitMode] = useState('itemized');
            const [equalMembers, setEqualMembers] = useState([]);
            const [modal, setModal] = useState({ type: null, data: null });
            const [newName, setNewName] = useState('');
            const fileInputRef = useRef(null);

            const appId = "office-lunch-room-1"; 
            const geminiKey = ""; // Gemini API

            useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(myConfig);
                const auth = firebase.auth();
                const unsub = auth.onAuthStateChanged(u => {
                    if (!u) auth.signInAnonymously();
                    else setUser(u);
                });
                return unsub;
            }, []);

            useEffect(() => {
                if (!user) return;
                const db = firebase.firestore();
                const path = db.collection('meal_data').doc(appId);
                const unsubM = path.collection('members').onSnapshot(s => setMembers(s.docs.map(d => ({id:d.id, ...d.data()}))));
                const unsubR = path.collection('receipts').onSnapshot(s => setReceipts(s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=>b.timestamp-a.timestamp)));
                return () => { unsubM(); unsubR(); };
            }, [user]);

            const settlements = useMemo(() => {
                let ds = [], cs = [];
                members.forEach(m => {
                    const b = m.balance || 0;
                    if (b < -0.1) ds.push({ name: m.name, bal: Math.abs(b) });
                    else if (b > 0.1) cs.push({ name: m.name, bal: b });
                });
                ds.sort((a,b)=>b.bal-a.bal); cs.sort((a,b)=>b.bal-a.bal);
                const res = []; let d=0, c=0;
                while(d < ds.length && c < cs.length) {
                    const amt = Math.min(ds[d].bal, cs[c].bal);
                    if(amt > 0.1) res.push({ from: ds[d].name, to: cs[c].name, amt });
                    ds[d].bal -= amt; cs[c].bal -= amt;
                    if(ds[d].bal < 0.1) d++; if(cs[c].bal < 0.1) c++;
                }
                return res;
            }, [members]);

            const handleScan = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    try {
                        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: "JSON ONLY: {\"items\": [{\"name\": \"item\", \"price\": 10.0}], \"total\": 10.0}" }, { inlineData: { mimeType: "image/png", data: base64 } }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        const data = await resp.json();
                        const json = JSON.parse(data.candidates[0].content.parts[0].text);
                        setCurrentReceipt({ items: json.items.map(i => ({ ...i, claim: [] })), total: json.total || json.items.reduce((s,x)=>s+x.price,0), timestamp: Date.now() });
                        setPayerId(''); setSplitMode('itemized'); setActiveTab('split');
                    } catch (err) { alert("AI 辨識失敗"); } finally { setLoading(false); }
                };
                reader.readAsDataURL(file);
            };

            const saveSplit = async () => {
                if (!payerId) { alert("請先選付款人"); return; }
                setLoading(true);
                try {
                    const db = firebase.firestore();
                    const path = db.collection('meal_data').doc(appId);
                    const shares = {}; members.forEach(m => shares[m.id] = 0);
                    if (splitMode === 'itemized') {
                        const sub = currentReceipt.items.reduce((s,i)=>s+i.price, 0);
                        const ratio = sub === 0 ? 1 : currentReceipt.total / sub;
                        currentReceipt.items.forEach(it => {
                            if (it.claim.length > 0) {
                                const p = (it.price * ratio) / it.claim.length;
                                it.claim.forEach(id => shares[id] += p);
                            }
                        });
                    } else {
                        const p = currentReceipt.total / equalMembers.length;
                        equalMembers.forEach(id => shares[id] = p);
                    }
                    const batch = db.batch();
                    const payer = members.find(m => m.id === payerId);
                    let pBal = (payer.balance || 0) + currentReceipt.total;
                    members.forEach(m => {
                        const s = shares[m.id] || 0;
                        if (m.id === payerId) pBal -= s;
                        else if (s > 0) batch.update(path.collection('members').doc(m.id), { balance: (m.balance || 0) - s });
                    });
                    batch.update(path.collection('members').doc(payerId), { balance: pBal });
                    await path.collection('receipts').add({ ...currentReceipt, shares, payerId, splitMode, settled: [], timestamp: Date.now() });
                    await batch.commit();
                    setCurrentReceipt(null); setActiveTab('dashboard');
                } catch (e) { console.error(e); } finally { setLoading(false); }
            };

            const togglePaid = async (receipt, mid, amt) => {
                const db = firebase.firestore();
                const isPaid = (receipt.settled || []).includes(mid);
                const batch = db.batch();
                const debtor = members.find(m => m.id === mid);
                const payer = members.find(m => m.id === receipt.payerId);
                if (!debtor || !payer) return;
                const path = db.collection('meal_data').doc(appId);
                if (!isPaid) {
                    batch.update(path.collection('members').doc(mid), { balance: (debtor.balance || 0) + amt });
                    batch.update(path.collection('members').doc(receipt.payerId), { balance: (payer.balance || 0) - amt });
                    batch.update(path.collection('receipts').doc(receipt.id), { settled: firebase.firestore.FieldValue.arrayUnion(mid) });
                } else {
                    batch.update(path.collection('members').doc(mid), { balance: (debtor.balance || 0) - amt });
                    batch.update(path.collection('members').doc(receipt.payerId), { balance: (payer.balance || 0) + amt });
                    batch.update(path.collection('receipts').doc(receipt.id), { settled: firebase.firestore.FieldValue.arrayRemove(mid) });
                }
                await batch.commit();
            };

            if (!user) return <div className="h-screen flex items-center justify-center text-indigo-600 font-black animate-pulse">正在與你的 Firebase 連線...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col relative shadow-2xl overflow-hidden">
                    <header className="p-4 bg-white border-b flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 text-white p-2 rounded-xl"><Icon.Receipt /></div>
                            <h1 className="font-black text-xl italic tracking-tighter">MEALSPLITTER</h1>
                        </div>
                        <button onClick={() => fileInputRef.current.click()} className="bg-indigo-600 text-white p-2.5 rounded-xl active:scale-95 shadow-lg"><Icon.Camera /></button>
                        <input type="file" ref={fileInputRef} onChange={handleScan} accept="image/*" className="hidden" />
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-32">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="bg-indigo-600 rounded-[32px] p-7 text-white shadow-xl">
                                    <h2 className="text-3xl font-black mb-6">結餘總覽</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white/10 p-4 rounded-2xl"><p className="text-[10px] opacity-60 font-bold uppercase mb-1">成員</p><p className="text-xl font-bold">{members.length} 人</p></div>
                                        <div className="bg-white/10 p-4 rounded-2xl"><p className="text-[10px] opacity-60 font-bold uppercase mb-1">單據</p><p className="text-xl font-bold">{receipts.length} 張</p></div>
                                    </div>
                                </div>
                                {settlements.length > 0 && (
                                    <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-5 shadow-sm">
                                        <h3 className="text-xs font-black text-emerald-700 mb-4 uppercase">清數指示</h3>
                                        {settlements.map((s, i) => (
                                            <div key={i} className="flex justify-between bg-white p-3.5 rounded-xl mb-2 text-sm border border-emerald-50 shadow-sm">
                                                <span className="font-bold text-slate-700">{s.from} ➔ {s.to}</span>
                                                <span className="font-black text-emerald-600">HK${s.amt.toFixed(1)}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <div className="flex justify-between items-center px-1">
                                    <h3 className="font-black text-slate-800">同事名單</h3>
                                    <button onClick={() => setModal({ type: 'add' })} className="text-indigo-600 text-xs font-bold bg-indigo-50 px-4 py-2 rounded-xl">+ 新增</button>
                                </div>
                                <div className="space-y-3">
                                    {members.map(m => (
                                        <div key={m.id} className="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center group shadow-sm">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 bg-slate-50 text-indigo-600 rounded-xl flex items-center justify-center font-black">{m.name?.[0]}</div>
                                                <span className="font-bold">{m.name}</span>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className={`font-mono font-black text-lg ${m.balance < -0.1 ? 'text-rose-500' : m.balance > 0.1 ? 'text-emerald-500' : 'text-slate-300'}`}>{m.balance < -0.1 ? `-HK$${Math.abs(m.balance).toFixed(1)}` : m.balance > 0.1 ? `+HK$${m.balance.toFixed(1)}` : 'HK$0'}</span>
                                                <button onClick={() => { if(confirm("刪除？")) firebase.firestore().collection('meal_data').doc(appId).collection('members').doc(m.id).delete() }} className="text-slate-200"><Icon.Trash /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'split' && currentReceipt && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black">分配單據</h2>
                                    <div className="flex bg-gray-100 p-1 rounded-xl">
                                        <button onClick={() => setSplitMode('itemized')} className={`px-4 py-2 rounded-lg text-xs font-bold ${splitMode === 'itemized' ? 'bg-white shadow text-indigo-600' : 'text-slate-400'}`}>按餐點</button>
                                        <button onClick={() => setSplitMode('equal')} className={`px-4 py-2 rounded-lg text-xs font-bold ${splitMode === 'equal' ? 'bg-white shadow text-indigo-600' : 'text-slate-400'}`}>全平分</button>
                                    </div>
                                </div>
                                <div className="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 flex justify-between items-center shadow-inner">
                                    <span className="font-bold text-indigo-400 text-sm">總金額</span>
                                    <span className="text-3xl font-black text-indigo-600">HK${currentReceipt.total.toFixed(1)}</span>
                                </div>
                                <section>
                                    <p className="text-xs font-black text-slate-400 mb-3 uppercase px-1">誰墊支了？</p>
                                    <div className="flex flex-wrap gap-2">
                                        {members.map(m => (
                                            <button key={m.id} onClick={() => setPayerId(m.id)} className={`px-4 py-2 rounded-xl text-xs font-bold border-2 transition-all ${payerId === m.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg' : 'bg-white border-slate-100 text-slate-400'}`}>{m.name}</button>
                                        ))}
                                    </div>
                                </section>
                                {splitMode === 'itemized' ? (
                                    <div className="space-y-4">
                                        {currentReceipt.items.map((it, idx) => (
                                            <div key={idx} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm transition-all hover:shadow-md">
                                                <div className="flex justify-between items-center mb-4"><span className="font-bold text-slate-700">{it.name}</span><span className="font-black text-indigo-600">HK${it.price.toFixed(1)}</span></div>
                                                <div className="flex flex-wrap gap-2">
                                                    {members.map(m => {
                                                        const active = it.claim.includes(m.id);
                                                        return <button key={m.id} onClick={() => {
                                                            const next = [...currentReceipt.items];
                                                            next[idx].claim = active ? next[idx].claim.filter(id => id !== m.id) : [...next[idx].claim, m.id];
                                                            setCurrentReceipt({ ...currentReceipt, items: next });
                                                        }} className={`px-4 py-2 rounded-xl text-[10px] font-bold border transition-all ${active ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>{m.name}</button>
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="bg-white p-7 rounded-3xl border border-slate-100 shadow-sm space-y-6">
                                        <p className="font-bold mb-4 text-center">誰平分這筆錢？</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            {members.map(m => (
                                                <button key={m.id} onClick={() => setEqualMembers(p => p.includes(m.id) ? p.filter(id => id !== m.id) : [...p, m.id])} className={`p-4 rounded-xl border-2 font-bold text-sm transition-all ${equalMembers.includes(m.id) ? 'bg-indigo-50 border-indigo-600 text-indigo-700' : 'bg-white border-slate-50 text-slate-300'}`}>{m.name}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div className="fixed bottom-24 left-0 right-0 p-4 max-w-md mx-auto flex gap-4 bg-white/80 backdrop-blur-md">
                                    <button onClick={() => setCurrentReceipt(null)} className="flex-1 py-4 bg-gray-50 text-slate-400 rounded-2xl font-bold">放棄</button>
                                    <button onClick={saveSplit} disabled={loading} className="flex-[2] py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl">{loading ? '處理中...' : '確認保存'}</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-black mb-4">單據紀錄</h2>
                                {receipts.map(r => (
                                    <div key={r.id} className="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm mb-6">
                                        <div className="flex justify-between items-start mb-4">
                                            <div><p className="text-[10px] text-slate-300 font-black mb-1 uppercase tracking-widest">{new Date(r.timestamp).toLocaleDateString()}</p><p className="text-2xl font-black">HK${r.total.toFixed(1)}</p></div>
                                            <button onClick={() => { if(confirm("刪除？")) firebase.firestore().collection('meal_data').doc(appId).collection('receipts').doc(r.id).delete() }} className="text-slate-200 p-2"><Icon.Trash /></button>
                                        </div>
                                        <div className="bg-indigo-50 px-3 py-1.5 rounded-xl inline-flex items-center gap-2 mb-6 border border-indigo-100"><span className="text-[10px] font-black text-indigo-400 uppercase">付款人:</span><span className="text-xs font-bold text-indigo-700">{members.find(m => m.id === r.payerId)?.name || '未知'}</span></div>
                                        <div className="space-y-3 pt-4 border-t border-slate-50">
                                            {Object.entries(r.shares || {}).filter(([mid, v]) => v > 0.1).map(([mid, v]) => {
                                                const isPaid = (r.settled || []).includes(mid);
                                                const m = members.find(item => item.id === mid);
                                                const isPayer = mid === r.payerId;
                                                return <div key={mid} className={`flex items-center justify-between p-3.5 rounded-2xl border transition-all ${isPaid ? 'bg-emerald-50 border-emerald-100 opacity-60' : 'bg-slate-50 border-slate-100'}`}>
                                                    <div className="flex flex-col"><span className="text-sm font-bold text-slate-700">{m?.name}</span><span className="text-[11px] font-black text-slate-400">HK${v.toFixed(1)}</span></div>
                                                    {!isPayer && <button onClick={() => togglePaid(r, mid, v)} className={`px-4 py-2 rounded-xl text-[11px] font-black transition-all flex items-center gap-1.5 ${isPaid ? 'bg-emerald-500 text-white' : 'bg-white border border-slate-200 text-slate-500 shadow-sm'}`}>{isPaid ? <><Icon.Check /> 已清</> : '標記已付'}</button>}
                                                    {isPayer && <span className="text-[10px] font-black text-indigo-400 uppercase px-2 py-1 rounded-lg border border-indigo-50">付款人</span>}
                                                </div>
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="bg-white p-4 border-t flex justify-around sticky bottom-0 z-40 pb-10 shadow-sm">
                        {[{ id: 'dashboard', icon: Icon.Users, label: '概覽' }, { id: 'split', icon: Icon.Receipt, label: '分賬' }, { id: 'history', icon: Icon.History, label: '紀錄' }].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex flex-col items-center gap-1 transition-all ${activeTab === t.id ? 'text-indigo-600 scale-110 font-black' : 'text-slate-300'}`}><t.icon /><span className="text-[10px] uppercase font-bold tracking-tighter">{t.label}</span></button>
                        ))}
                    </nav>

                    {modal.type === 'add' && (
                        <div className="fixed inset-0 z-[100] bg-black/60 flex items-end p-4 animate-in slide-in-from-bottom-20">
                            <div className="bg-white w-full rounded-[40px] p-8 pb-12 shadow-2xl">
                                <div className="flex justify-between items-center mb-6"><h3 className="text-2xl font-black text-slate-800">新增同事</h3><button onClick={() => setModal({type:null})} className="text-slate-400"><Icon.X /></button></div>
                                <input autoFocus value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === 'Enter' && (async () => { if(!newName.trim()) return; await firebase.firestore().collection('meal_data').doc(appId).collection('members').add({ name: newName.trim(), balance: 0 }); setNewName(''); setModal({type:null}); })()} placeholder="同事名字..." className="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-3xl mb-8 font-bold text-lg focus:border-indigo-600 outline-none" />
                                <button onClick={async () => { if(!newName.trim()) return; await firebase.firestore().collection('meal_data').doc(appId).collection('members').add({ name: newName.trim(), balance: 0 }); setNewName(''); setModal({type:null}); }} className="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black text-lg">確認加入</button>
                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className="fixed inset-0 z-[200] bg-white/95 flex flex-col items-center justify-center">
                            <div className="w-14 h-14 border-4 border-indigo-100 border-t-indigo-600 rounded-full spinner mb-4"></div>
                            <p className="font-black text-slate-800 text-2xl tracking-tighter">AI 正在努力閱讀...</p>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
