<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MealSplitter - 食飯計數助手</title>
    <!-- 載入核心庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 使用 Firebase 兼容版 (Compat) SDK，避免 GitHub 上的模組路徑問題 -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; border-top-color: transparent; }
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .tab-active { color: #4f46e5; border-bottom: 2px solid #4f46e5; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 1. 配置處理 (解決 GitHub 白屏的關鍵) ---
        const getInitialConfig = () => {
            // 優先嘗試 Gemini 環境變量
            if (window.__firebase_config) {
                try { return JSON.parse(window.__firebase_config); } catch(e) {}
            }
            // 其次嘗試 localStorage (GitHub 發佈後使用)
            const saved = localStorage.getItem('meal_splitter_config');
            if (saved) {
                try { return JSON.parse(saved); } catch(e) {}
            }
            return null;
        };

        const App = () => {
            const [fbConfig, setFbConfig] = useState(getInitialConfig());
            const [isReady, setIsReady] = useState(false);
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [members, setMembers] = useState([]);
            const [receipts, setReceipts] = useState([]);
            const [loading, setLoading] = useState(false);
            const [currentReceipt, setCurrentReceipt] = useState(null);
            const [payerId, setPayerId] = useState('');
            const [splitMode, setSplitMode] = useState('itemized');
            const [equalMembers, setEqualMembers] = useState([]);
            const [modal, setModal] = useState({ type: null, data: null });
            const [newName, setNewName] = useState('');
            const [configInput, setConfigInput] = useState('');
            const fileInputRef = useRef(null);

            const appId = window.__app_id || 'meal-splitter-vfinal';
            const geminiKey = ""; // Environment provided

            // --- 2. 初始化 Firebase ---
            useEffect(() => {
                if (!fbConfig || !fbConfig.apiKey) return;
                
                try {
                    if (!firebase.apps.length) {
                        firebase.initializeApp(fbConfig);
                    }
                    const auth = firebase.auth();
                    const db = firebase.firestore();

                    const unsubAuth = auth.onAuthStateChanged(u => {
                        if (!u) {
                            auth.signInAnonymously();
                        } else {
                            setUser(u);
                        }
                    });

                    setIsReady(true);
                    return () => unsubAuth();
                } catch (e) {
                    console.error("Firebase Init Error", e);
                }
            }, [fbConfig]);

            // --- 3. 數據監聽 ---
            useEffect(() => {
                if (!user || !isReady) return;
                const db = firebase.firestore();
                const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubM = baseRef.collection('members').onSnapshot(s => {
                    setMembers(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubR = baseRef.collection('receipts').onSnapshot(s => {
                    setReceipts(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.timestamp - a.timestamp));
                });
                
                return () => { unsubM(); unsubR(); };
            }, [user, isReady]);

            // --- 4. 業務邏輯 ---
            const settlements = useMemo(() => {
                let ds = [], cs = [];
                members.forEach(m => {
                    const b = m.balance || 0;
                    if (b < -0.1) ds.push({ name: m.name, bal: Math.abs(b) });
                    else if (b > 0.1) cs.push({ name: m.name, bal: b });
                });
                ds.sort((a,b) => b.bal - a.bal); cs.sort((a,b) => b.bal - a.bal);
                const res = []; let d=0, c=0;
                while(d < ds.length && c < cs.length) {
                    const amt = Math.min(ds[d].bal, cs[c].bal);
                    if(amt > 0.1) res.push({ from: ds[d].name, to: cs[c].name, amt });
                    ds[d].bal -= amt; cs[c].bal -= amt;
                    if(ds[d].bal < 0.1) d++; if(cs[c].bal < 0.1) c++;
                }
                return res;
            }, [members]);

            const handleScan = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    try {
                        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: "Extract items and prices from this receipt. Return JSON: {\"items\": [{\"name\": \"string\", \"price\": number}], \"total\": number}" }, { inlineData: { mimeType: "image/png", data: base64 } }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        const data = await resp.json();
                        const json = JSON.parse(data.candidates[0].content.parts[0].text);
                        setCurrentReceipt({ items: json.items.map(i => ({ ...i, claim: [] })), total: json.total || json.items.reduce((s,x) => s + x.price, 0), timestamp: Date.now() });
                        setPayerId(''); setSplitMode('itemized'); setActiveTab('split');
                    } catch (err) { alert("AI 辨識失敗，請檢查網絡"); } finally { setLoading(false); }
                };
                reader.readAsDataURL(file);
            };

            const saveSplit = async () => {
                if (!payerId) { alert("請先選擇付款人！"); return; }
                setLoading(true);
                try {
                    const db = firebase.firestore();
                    const shares = {}; members.forEach(m => shares[m.id] = 0);
                    if (splitMode === 'itemized') {
                        const sub = currentReceipt.items.reduce((s,i) => s + i.price, 0);
                        const ratio = sub === 0 ? 1 : currentReceipt.total / sub;
                        currentReceipt.items.forEach(it => {
                            if (it.claim.length > 0) {
                                const p = (it.price * ratio) / it.claim.length;
                                it.claim.forEach(id => shares[id] += p);
                            }
                        });
                    } else {
                        if (!equalMembers.length) { alert('請選擇成員'); setLoading(false); return; }
                        const p = currentReceipt.total / equalMembers.length;
                        equalMembers.forEach(id => shares[id] = p);
                    }

                    const batch = db.batch();
                    const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                    const payerDoc = members.find(m => m.id === payerId);
                    let pBal = (payerDoc.balance || 0) + currentReceipt.total;
                    
                    members.forEach(m => {
                        const s = shares[m.id] || 0;
                        if (m.id === payerId) pBal -= s;
                        else if (s > 0) batch.update(baseRef.collection('members').doc(m.id), { balance: (m.balance || 0) - s });
                    });
                    batch.update(baseRef.collection('members').doc(payerId), { balance: pBal });
                    await baseRef.collection('receipts').add({ ...currentReceipt, shares, payerId, splitMode, settled: [], timestamp: Date.now() });
                    await batch.commit();
                    setCurrentReceipt(null); setActiveTab('dashboard');
                } catch (e) { console.error(e); } finally { setLoading(false); }
            };

            const togglePaid = async (receipt, mid, amt) => {
                const db = firebase.firestore();
                const isPaid = (receipt.settled || []).includes(mid);
                const batch = db.batch();
                const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const debtor = members.find(m => m.id === mid);
                const payer = members.find(m => m.id === receipt.payerId);
                const rRef = baseRef.collection('receipts').doc(receipt.id);
                
                if (!isPaid) {
                    batch.update(baseRef.collection('members').doc(mid), { balance: (debtor.balance || 0) + amt });
                    batch.update(baseRef.collection('members').doc(receipt.payerId), { balance: (payer.balance || 0) - amt });
                    batch.update(rRef, { settled: firebase.firestore.FieldValue.arrayUnion(mid) });
                } else {
                    batch.update(baseRef.collection('members').doc(mid), { balance: (debtor.balance || 0) - amt });
                    batch.update(baseRef.collection('members').doc(receipt.payerId), { balance: (payer.balance || 0) + amt });
                    batch.update(rRef, { settled: firebase.firestore.FieldValue.arrayRemove(mid) });
                }
                await batch.commit();
            };

            // --- 5. 渲染輔助 ---
            const Icon = {
                Camera: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>,
                Users: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>,
                Receipt: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z"></path></svg>,
                History: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
                Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
                Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
                X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            };

            // 如果沒有 Config，顯示設置畫面 (解決 GitHub 白屏)
            if (!fbConfig) {
                return (
                    <div className="min-h-screen p-8 flex flex-col items-center justify-center bg-indigo-600 text-white">
                        <div className="bg-white/10 p-6 rounded-3xl w-full max-w-sm border border-white/20">
                            <h2 className="text-2xl font-black mb-4 tracking-tighter">初次使用設置</h2>
                            <p className="text-sm opacity-80 mb-6 font-bold">請貼入你的 Firebase Web Config (JSON 格式)，這樣才能在 GitHub Pages 同步資料。</p>
                            <textarea 
                                value={configInput}
                                onChange={e => setConfigInput(e.target.value)}
                                placeholder='{"apiKey": "...", "authDomain": "...", ...}'
                                className="w-full h-32 bg-white/5 border border-white/20 rounded-2xl p-4 text-xs font-mono focus:outline-none mb-6"
                            />
                            <button 
                                onClick={() => {
                                    try {
                                        const parsed = JSON.parse(configInput);
                                        localStorage.setItem('meal_splitter_config', configInput);
                                        setFbConfig(parsed);
                                    } catch(e) { alert("JSON 格式不正確！"); }
                                }}
                                className="w-full bg-white text-indigo-600 py-4 rounded-2xl font-black"
                            >
                                完成設置並開始
                            </button>
                        </div>
                    </div>
                );
            }

            if (!user) return <div className="h-screen flex items-center justify-center text-indigo-600 font-black animate-pulse">連線中...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col relative shadow-2xl">
                    <header className="p-4 border-b flex justify-between items-center sticky top-0 bg-white z-40">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 text-white p-2 rounded-xl"><Icon.Receipt /></div>
                            <h1 className="font-black text-xl italic tracking-tighter">MEALSPLITTER</h1>
                        </div>
                        <button onClick={() => fileInputRef.current.click()} className="bg-indigo-600 text-white p-2.5 rounded-xl active:scale-95 transition-all shadow-lg"><Icon.Camera /></button>
                        <input type="file" ref={fileInputRef} onChange={handleScan} accept="image/*" className="hidden" />
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-32">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-indigo-600 rounded-[32px] p-7 text-white shadow-xl">
                                    <h2 className="text-3xl font-black mb-6">結餘總覽</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white/10 p-4 rounded-2xl"><p className="text-[10px] opacity-60 font-bold mb-1">成員</p><p className="text-xl font-bold">{members.length} 人</p></div>
                                        <div className="bg-white/10 p-4 rounded-2xl"><p className="text-[10px] opacity-60 font-bold mb-1">單據</p><p className="text-xl font-bold">{receipts.length} 張</p></div>
                                    </div>
                                </div>
                                {settlements.length > 0 && (
                                    <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-5 shadow-sm">
                                        <h3 className="text-xs font-black text-emerald-700 mb-4 uppercase">清數指示</h3>
                                        {settlements.map((s, i) => (
                                            <div key={i} className="flex justify-between bg-white p-3 rounded-xl mb-2 text-sm shadow-sm border border-emerald-50">
                                                <span className="font-bold text-slate-700">{s.from} ➔ {s.to}</span>
                                                <span className="font-black text-emerald-600">HK${s.amt.toFixed(1)}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <div className="flex justify-between items-center px-1 pt-2">
                                    <h3 className="font-black text-slate-800">同事結欠</h3>
                                    <button onClick={() => setModal({ type: 'add' })} className="text-indigo-600 text-xs font-bold bg-indigo-50 px-4 py-2 rounded-xl">+ 新增成員</button>
                                </div>
                                <div className="space-y-3">
                                    {members.map(m => (
                                        <div key={m.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center group">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 bg-slate-50 text-indigo-600 rounded-xl flex items-center justify-center font-black">{m.name?.[0]}</div>
                                                <span className="font-bold text-slate-700">{m.name}</span>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className={`font-mono font-black text-lg ${m.balance < -0.1 ? 'text-rose-500' : m.balance > 0.1 ? 'text-emerald-500' : 'text-slate-300'}`}>{m.balance < -0.1 ? `-HK$${Math.abs(m.balance).toFixed(1)}` : m.balance > 0.1 ? `+HK$${m.balance.toFixed(1)}` : 'HK$0'}</span>
                                                <button onClick={() => setModal({ type: 'delete', data: m })} className="text-slate-200"><Icon.Trash /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'split' && currentReceipt && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black">分配單據</h2>
                                    <div className="flex bg-gray-100 p-1 rounded-xl">
                                        <button onClick={() => setSplitMode('itemized')} className={`px-4 py-2 rounded-lg text-xs font-bold ${splitMode === 'itemized' ? 'bg-white shadow text-indigo-600' : 'text-slate-400'}`}>按餐點</button>
                                        <button onClick={() => setSplitMode('equal')} className={`px-4 py-2 rounded-lg text-xs font-bold ${splitMode === 'equal' ? 'bg-white shadow text-indigo-600' : 'text-slate-400'}`}>全平分</button>
                                    </div>
                                </div>
                                <div className="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 flex justify-between items-center shadow-inner">
                                    <span className="font-bold text-indigo-400 text-sm uppercase">總額</span>
                                    <span className="text-3xl font-black text-indigo-600">HK${currentReceipt.total.toFixed(1)}</span>
                                </div>
                                <section>
                                    <p className="text-xs font-bold text-slate-400 mb-3 uppercase px-1">誰墊支了？</p>
                                    <div className="flex flex-wrap gap-2">
                                        {members.map(m => (
                                            <button key={m.id} onClick={() => setPayerId(m.id)} className={`px-4 py-2 rounded-xl text-xs font-bold border-2 transition-all ${payerId === m.id ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-100 text-slate-500'}`}>{m.name}</button>
                                        ))}
                                    </div>
                                </section>
                                {splitMode === 'itemized' ? (
                                    <div className="space-y-4">
                                        {currentReceipt.items.map((it, idx) => (
                                            <div key={idx} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm transition-all hover:shadow-md">
                                                <div className="flex justify-between items-center mb-4"><span className="font-bold text-slate-800 text-lg">{it.name}</span><span className="text-indigo-600 font-black">HK${it.price.toFixed(1)}</span></div>
                                                <div className="flex flex-wrap gap-2">
                                                    {members.map(m => {
                                                        const active = it.claim.includes(m.id);
                                                        return <button key={m.id} onClick={() => {
                                                            const next = [...currentReceipt.items];
                                                            next[idx].claim = active ? next[idx].claim.filter(id => id !== m.id) : [...next[idx].claim, m.id];
                                                            setCurrentReceipt({ ...currentReceipt, items: next });
                                                        }} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all ${active ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>{m.name}</button>
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="bg-white p-7 rounded-3xl border border-slate-100 shadow-sm">
                                        <p className="font-bold text-slate-800 text-center mb-4">選擇平分成員</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            {members.map(m => (
                                                <button key={m.id} onClick={() => setEqualMembers(p => p.includes(m.id) ? p.filter(id => id !== m.id) : [...p, m.id])} className={`p-4 rounded-xl border-2 font-bold text-sm transition-all ${equalMembers.includes(m.id) ? 'bg-indigo-50 border-indigo-600 text-indigo-700' : 'bg-white border-slate-50 text-slate-300'}`}>{m.name}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div className="fixed bottom-24 left-0 right-0 p-4 max-w-md mx-auto flex gap-4 bg-white/80 backdrop-blur-md z-40">
                                    <button onClick={() => setCurrentReceipt(null)} className="flex-1 py-4 bg-gray-50 text-slate-400 rounded-2xl font-bold">放棄</button>
                                    <button onClick={saveSplit} disabled={loading} className="flex-[2] py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-100">{loading ? '處理中...' : '確認保存'}</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-black mb-4 px-1">單據紀錄</h2>
                                {receipts.map(r => (
                                    <div key={r.id} className="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm overflow-hidden mb-6">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <p className="text-[10px] text-slate-300 font-black mb-1 uppercase tracking-widest">{new Date(r.timestamp).toLocaleDateString()}</p>
                                                <p className="text-2xl font-black text-slate-800">HK${r.total.toFixed(1)}</p>
                                            </div>
                                            <button onClick={() => setModal({ type: 'deleteRec', data: r.id })} className="text-slate-200 p-2"><Icon.Trash /></button>
                                        </div>
                                        <div className="bg-indigo-50 px-3 py-1.5 rounded-xl inline-flex items-center gap-2 mb-6 border border-indigo-100"><span className="text-[10px] font-black text-indigo-400 uppercase">付款人:</span><span className="text-xs font-bold text-indigo-700">{members.find(m => m.id === r.payerId)?.name || '未知'}</span></div>
                                        <div className="space-y-3 pt-4 border-t border-slate-50">
                                            <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-2">成員收款進度 (點擊標記已清)</p>
                                            {Object.entries(r.shares || {}).filter(([mid, v]) => v > 0.1).map(([mid, v]) => {
                                                const isPaid = (r.settled || []).includes(mid);
                                                const m = members.find(item => item.id === mid);
                                                const isPayer = mid === r.payerId;
                                                return <div key={mid} className={`flex items-center justify-between p-3.5 rounded-2xl border transition-all ${isPaid ? 'bg-emerald-50 border-emerald-100 opacity-60' : 'bg-slate-50 border-slate-100'}`}>
                                                    <div className="flex flex-col"><span className="text-sm font-bold text-slate-700">{m?.name}</span><span className="text-[11px] font-black text-slate-400">HK${v.toFixed(1)}</span></div>
                                                    {!isPayer && <button onClick={() => togglePaid(r, mid, v)} className={`px-4 py-2 rounded-xl text-[11px] font-black transition-all flex items-center gap-1.5 ${isPaid ? 'bg-emerald-500 text-white' : 'bg-white border border-slate-200 text-slate-500 shadow-sm'}`}>{isPaid ? <><Icon.Check /> 已清</> : '標記已付'}</button>}
                                                    {isPayer && <span className="text-[10px] font-black text-indigo-400 uppercase px-2 py-1 rounded-lg border border-indigo-50">付款人</span>}
                                                </div>
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="bg-white/90 backdrop-blur-md p-4 border-t flex justify-around sticky bottom-0 z-40 pb-9">
                        {[
                            { id: 'dashboard', icon: Icon.Users, label: '概覽' },
                            { id: 'split', icon: Icon.Receipt, label: '分賬' },
                            { id: 'history', icon: Icon.History, label: '紀錄' }
                        ].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex flex-col items-center gap-1 transition-all duration-300 ${activeTab === t.id ? 'text-indigo-600 scale-110 font-black' : 'text-slate-300'}`}>
                                <t.icon /> <span className="text-[10px] uppercase">{t.label}</span>
                            </button>
                        ))}
                    </nav>

                    {/* Modals */}
                    {modal.type === 'add' && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-end p-4">
                            <div className="bg-white w-full rounded-[40px] p-8 pb-12 animate-in slide-in-from-bottom-20">
                                <div className="flex justify-between items-center mb-8"><h3 className="text-2xl font-black text-slate-800">新增成員</h3><button onClick={() => setModal({type:null})} className="text-slate-400"><Icon.X /></button></div>
                                <input autoFocus value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === 'Enter' && (async () => { 
                                    if(!newName.trim()) return; 
                                    const db = firebase.firestore();
                                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('members').add({ name: newName.trim(), balance: 0 }); 
                                    setNewName(''); setModal({type:null}); 
                                })()} placeholder="例如：小明" className="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-3xl mb-8 font-bold text-lg" />
                                <button onClick={async () => { if(!newName.trim()) return; const db = firebase.firestore(); await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('members').add({ name: newName.trim(), balance: 0 }); setNewName(''); setModal({type:null}); }} className="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black text-lg shadow-xl shadow-indigo-100">確認加入</button>
                            </div>
                        </div>
                    )}

                    {modal.type === 'delete' && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-6"><div className="bg-white w-full max-w-xs rounded-[40px] p-8 text-center shadow-2xl animate-in zoom-in-95"><h3 className="text-xl font-black mb-4">刪除成員？</h3><div className="flex gap-4"><button onClick={() => setModal({type:null})} className="flex-1 py-4 bg-slate-50 text-slate-400 rounded-2xl font-bold">取消</button><button onClick={async () => { const db = firebase.firestore(); await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('members').doc(modal.data.id).delete(); setModal({type:null}); }} className="flex-1 py-4 bg-rose-500 text-white rounded-2xl font-bold">刪除</button></div></div></div>
                    )}

                    {modal.type === 'deleteRec' && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-6"><div className="bg-white w-full max-w-xs rounded-[40px] p-8 text-center shadow-2xl animate-in zoom-in-95"><h3 className="text-xl font-black mb-4">刪除紀錄？</h3><div className="flex gap-4"><button onClick={() => setModal({type:null})} className="flex-1 py-4 bg-slate-50 text-slate-400 rounded-2xl font-bold">取消</button><button onClick={async () => { const db = firebase.firestore(); await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('receipts').doc(modal.data).delete(); setModal({type:null}); }} className="flex-1 py-4 bg-rose-500 text-white rounded-2xl font-bold">刪除</button></div></div></div>
                    )}

                    {loading && (
                        <div className="fixed inset-0 z-[200] bg-white/95 flex flex-col items-center justify-center">
                            <div className="w-14 h-14 border-4 border-indigo-100 border-t-indigo-600 rounded-full spinner mb-4"></div>
                            <p className="font-black text-slate-800 text-2xl tracking-tighter">AI 正在掃描...</p>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
